<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste: Otávio Pelego</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0e15;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Detalhes coloridos de fundo para dar modernidade */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 1;
        }

        body::before {
            background: #00f2fe;
            top: 20%;
            left: 25%;
        }

        body::after {
            background: #4facfe;
            bottom: 20%;
            right: 25%;
        }

        .container {
            text-align: center;
            z-index: 2;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #ff007f, #7928ca, #00dfd8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 4s ease infinite;
        }

        p {
            color: #656a8a;
            margin-top: 1rem;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .container { width: 90%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Otávio Pelego</h1>
        <p>Ambiente de Teste</p>
    </div>

</body>
</html>
